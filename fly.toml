# Fly.io config. Rename `app` and pick a `primary_region` (fly platform regions),
# then: fly volumes create iv_data --size 3 --region <same-region>  &&  fly deploy
app = "ideavalidator"
primary_region = "iad"

[build]

[env]
  # SQLite lives on the mounted volume so it survives deploys/restarts.
  DATA_DIR = "/data"
  PORT = "3000"
  NODE_ENV = "production"

# Persistent single-node store: never auto-stop the machine — a stopped machine kills
# in-flight validations and detaches from the SQLite file. Keep exactly one running.
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[mounts]
  source = "iv_data"
  destination = "/data"

# Opus scoring builds large JSON and Chromium (PDF) is memory-hungry — give it headroom.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
